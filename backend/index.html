<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ToDo List</title>
</head>
<body>
  <h1>ToDo List</h1>

  <form id="todoForm">
    <input type="text" id="todoInput" placeholder="新しいタスク" required>
    <button type="submit">追加</button>
  </form>

  <ul id="todoList"></ul>

  <script>
    const apiBase = "http://localhost:8080/todos";
    const listEl = document.getElementById("todoList");
    const inputEl = document.getElementById("todoInput");

    // --- API 呼び出し ---
    async function apiFetch(url, method = "GET", body = null) {
      const options = { method, headers: { "Content-Type": "application/json" } };
      if (body) options.body = JSON.stringify(body);
      const res = await fetch(url, options);
      if (!res.ok) throw new Error(`Failed ${method} ${url}`);
      return res.ok ? res.json() : null;
    }

    // --- タスクリスト取得 ---
    async function fetchTodos() {
      try {
        const todos = await apiFetch(apiBase);
        renderTodos(todos);
      } catch (err) {
        console.error(err);
      }
    }

    // --- タスク描画 ---
    function renderTodos(todos) {
      listEl.innerHTML = "";
      todos.forEach(todo => {
        const li = document.createElement("li");

        // チェックボックス
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = todo.done;
        checkbox.addEventListener("change", async () => {
          await updateTodo(todo.id, { title: todo.title, done: checkbox.checked });
          fetchTodos();
        });
        li.appendChild(checkbox);

        // タイトル
        const span = document.createElement("span");
        span.textContent = " " + todo.title;
        li.appendChild(span);

        // 削除ボタン
        const delBtn = document.createElement("button");
        delBtn.textContent = "削除";
        delBtn.style.marginLeft = "10px";
        delBtn.addEventListener("click", async () => {
          await deleteTodo(todo.id);
          fetchTodos();
        });
        li.appendChild(delBtn);

        listEl.appendChild(li);
      });
    }

    // --- タスク追加 ---
    async function addTodo(title) {
      await apiFetch(apiBase, "POST", { title, done: false });
      fetchTodos();
    }

    // --- タスク更新 ---
    async function updateTodo(id, todo) {
      await apiFetch(`${apiBase}/${id}`, "PUT", todo);
    }

    // --- タスク削除 ---
    async function deleteTodo(id) {
      await apiFetch(`${apiBase}/${id}`, "DELETE");
    }

    // --- イベント ---
    document.getElementById("todoForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const title = inputEl.value.trim();
      if (!title) return;
      addTodo(title);
      inputEl.value = "";
    });

    // 初期表示
    fetchTodos();
  </script>
</body>
</html>
